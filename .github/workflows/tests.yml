name: Tests

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "exhibitors/locale/**"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "exhibitors/locale/**"

jobs:
  test:
    runs-on: ubuntu-latest
    name: Exhibitors Plugin Tests

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: eventyay
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout exhibitors plugin
        uses: actions/checkout@v4

      - name: Clone eventyay-tickets
        run: |
          git clone https://github.com/fossasia/eventyay-tickets.git ../eventyay-tickets

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y gettext libjpeg-dev zlib1g-dev libpq-dev

      - name: Set up virtual environment
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip

          # Install eventyay-tickets with dev dependencies
          cd ../eventyay-tickets
          pip install -e ".[dev]"

          # Go back to plugin directory and install it
          cd ../eventyay-exhibition
          pip install -e .

          # Install test dependencies
          pip install pytest-rerunfailures

      - name: Compile translations
        run: |
          source venv/bin/activate
          make

      - name: Run tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/eventyay
          REDIS_URL: redis://localhost:6379/0
        run: |
          source venv/bin/activate
          pytest tests --reruns 3
